<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-SMS Pro | Marketing Tool</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #4e54c8; --secondary: #28a745; --danger: #dc3545; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .box { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 24px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; color: white; }
        .btn-p { background: var(--primary); }
        .btn-s { background: var(--secondary); }
        .btn-d { background: var(--danger); }
        .btn-back { background: #6c757d; margin-top: 10px; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #eee; }
        .list-item { display: flex; justify-content: space-between; background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 4px solid var(--primary); font-size: 13px; }
    </style>
</head>
<body>

<div class="box">
    <div id="auth-section">
        <h2>Ad-SMS Pro</h2>
        <input type="email" id="u-email" placeholder="আপনার জিমেইল">
        <input type="password" id="u-pass" placeholder="পাসওয়ার্ড">
        <button class="btn btn-p" onclick="login()">লগইন</button>
        <button class="btn btn-s" onclick="signup()">রেজিস্ট্রেশন করুন</button>
        <p onclick="forgotPass()" style="text-align:center; color:blue; cursor:pointer; margin-top:15px; font-size:13px;">পাসওয়ার্ড ভুলে গেছেন?</p>
    </div>

    <div id="dash-section" class="hidden">
        <h2>ড্যাশবোর্ড</h2>
        <div class="grid">
            <div class="card" onclick="showSection('list-section')"><i class="fas fa-users"></i><br>জিমেইল লিস্ট</div>
            <div class="card" onclick="showSection('msg-section')"><i class="fas fa-paper-plane"></i><br>SMS পাঠান</div>
            <div class="card" onclick="showSection('sett-section')"><i class="fas fa-cog"></i><br>সেটিংস</div>
            <div class="card" onclick="logout()" style="color:red;"><i class="fas fa-sign-out-alt"></i><br>লগআউট</div>
        </div>
    </div>

    <div id="list-section" class="hidden">
        <h3>জিমেইল লিস্ট</h3>
        <div id="contact-display" style="max-height: 180px; overflow-y: auto; margin-bottom: 10px;"></div>
        <input type="text" id="c-name" placeholder="নাম">
        <input type="email" id="c-email" placeholder="জিমেইল আইডি">
        <button class="btn btn-s" onclick="saveContact()">সেভ করুন</button>
        <button class="btn btn-back" onclick="showSection('dash-section')">ফিরে যান</button>
    </div>

    <div id="msg-section" class="hidden">
        <h3>মেসেজ বক্স</h3>
        <textarea id="msg-content" rows="6" placeholder="আপনার SMS বা Adstara লিংক..."></textarea>
        <button class="btn btn-p" onclick="sendToAll()">সব জিমেইলে পাঠান</button>
        <button class="btn btn-back" onclick="showSection('dash-section')">ফিরে যান</button>
    </div>

    <div id="sett-section" class="hidden">
        <h3>সেটিংস</h3>
        <p style="font-size: 13px; color: #666; margin: 10px 0;">পাসওয়ার্ড পরিবর্তন করতে চান? আপনার মেইলে লিঙ্ক যাবে।</p>
        <button class="btn btn-d" onclick="forgotPass()">পাসওয়ার্ড রিসেট করুন</button>
        <button class="btn btn-back" onclick="showSection('dash-section')">ফিরে যান</button>
    </div>
</div>

<script>
    // ফায়ারবেজ কনফিগ
    const firebaseConfig = {
        apiKey: "AIzaSyC8NEgB7dsgINyvioNcC65WvC78pEkmXrw",
        authDomain: "ad-sms.firebaseapp.com",
        projectId: "ad-sms",
        databaseURL: "https://ad-sms-default-rtdb.firebaseio.com",
        storageBucket: "ad-sms.firebasestorage.app",
        messagingSenderId: "162639397700",
        appId: "1:162639397700:web:f9983216ba2731dcabcd11"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // EmailJS - আপনার তথ্য অনুযায়ী আপডেট করা হয়েছে
    emailjs.init("mjx-F2TmBPxlLfsD72229");

    function signup() {
        auth.createUserWithEmailAndPassword(v('u-email'), v('u-pass'))
        .then(() => alert("রেজিস্ট্রেশন সফল! এখন লগইন করুন।"))
        .catch(e => alert("ভুল: " + e.message));
    }

    function login() {
        auth.signInWithEmailAndPassword(v('u-email'), v('u-pass'))
        .then(() => { showSection('dash-section'); loadContacts(); })
        .catch(e => alert("লগইন হয়নি! ইমেইল ও পাসওয়ার্ড চেক করুন।"));
    }

    function forgotPass() {
        let email = v('u-email') || prompt("আপনার জিমেইল দিন:");
        if(email) auth.sendPasswordResetEmail(email)
        .then(() => alert("পাসওয়ার্ড রিসেট লিঙ্ক আপনার মেইলে পাঠানো হয়েছে (Spam চেক করুন)।"))
        .catch(e => alert(e.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function showSection(id) {
        document.querySelectorAll('.box > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function v(id) { return document.getElementById(id).value; }

    function saveContact() {
        let name = v('c-name'), email = v('c-email');
        if(name && email) {
            db.ref('contacts/' + auth.currentUser.uid).push({ name, email });
            document.getElementById('c-name').value = '';
            document.getElementById('c-email').value = '';
        } else { alert("তথ্যগুলো পূরণ করুন"); }
    }

    function loadContacts() {
        db.ref('contacts/' + auth.currentUser.uid).on('value', s => {
            let listDiv = document.getElementById('contact-display');
            listDiv.innerHTML = '';
            s.forEach(child => {
                listDiv.innerHTML += `<div class="list-item">
                    <span>${child.val().name} (${child.val().email})</span>
                    <button style="color:red; border:none; background:none;" onclick="del('${child.key}')"><i class="fas fa-trash"></i></button>
                </div>`;
            });
        });
    }

    function del(key) { if(confirm("মুছবেন?")) db.ref('contacts/' + auth.currentUser.uid + '/' + key).remove(); }

    function sendToAll() {
        let msg = v('msg-content');
        if(!msg) return alert("মেসেজ বক্স খালি!");
        db.ref('contacts/' + auth.currentUser.uid).once('value', s => {
            if(!s.exists()) return alert("লিস্টে কোনো মেইল নেই!");
            s.forEach(child => {
                // আপনার টেমপ্লেট আইডি বসানো হয়েছে
                emailjs.send("service_76dt1bu", "template_jkcu1eb", {
                    to_email: child.val().email,
                    message: msg,
                    name: child.val().name
                });
            });
            alert("সবাইকে পাঠানো হয়েছে!");
        });
    }
</script>
</body>
</html>
