<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-SMS Pro | Professional Marketing Tool</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .main-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { text-align: center; margin-bottom: 25px; font-size: 28px; font-weight: 700; }
        h2 span { color: var(--primary); }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: #1e293b; }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
        }
        .btn-p { background: var(--primary); }
        .btn-s { background: var(--success); }
        .btn-d { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-back { background: #475569; margin-top: 15px; }

        .hidden { display: none; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .card-btn { background: #334155; padding: 25px 15px; border-radius: 18px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .card-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card-btn i { font-size: 28px; color: var(--primary); margin-bottom: 12px; }

        .list-container { max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .list-item { background: #334155; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-icon { color: var(--danger); cursor: pointer; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="auth-section">
        <h2>Ad-SMS <span>Pro</span></h2>
        <input type="email" id="u-email" placeholder="আপনার জিমেইল">
        <input type="password" id="u-pass" placeholder="পাসওয়ার্ড">
        <button id="login-btn" class="btn btn-p" onclick="login()"><i class="fas fa-sign-in-alt"></i> লগইন</button>
        <button id="signup-btn" class="btn btn-s hidden" onclick="signup()"><i class="fas fa-user-plus"></i> রেজিস্ট্রেশন</button>
        <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8;">
            <p id="toggle-text">একাউন্ট নেই? <span onclick="toggleAuth(true)" style="color:var(--primary); cursor:pointer;">তৈরি করুন</span></p>
            <p onclick="forgotPass()" style="margin-top: 10px; color: #ef4444; cursor:pointer;">পাসওয়ার্ড ভুলে গেছেন?</p>
        </div>
    </div>

    <div id="dash-section" class="hidden">
        <h2>Ad-SMS <span>Panel</span></h2>
        <div class="grid">
            <div class="card-btn" onclick="showSection('list-section')"><i class="fas fa-users"></i><br>জিমেইল লিস্ট</div>
            <div class="card-btn" onclick="showSection('msg-section')"><i class="fas fa-paper-plane"></i><br>SMS পাঠান</div>
            <div class="card-btn" onclick="showSection('sett-section')"><i class="fas fa-cog"></i><br>সেটিংস</div>
            <div class="card-btn" onclick="logout()"><i class="fas fa-power-off" style="color: #ef4444;"></i><br>লগআউট</div>
        </div>
    </div>

    <div id="list-section" class="hidden">
        <h3>জিমেইল লিস্ট</h3>
        <div class="list-container" id="contact-display"></div>
        <input type="text" id="c-name" placeholder="নাম">
        <input type="email" id="c-email" placeholder="জিমেইল এড্রেস">
        <button class="btn btn-s" onclick="saveContact()"><i class="fas fa-plus"></i> সেভ করুন</button>
        <button class="btn btn-back" onclick="showSection('dash-section')">ফিরে যান</button>
    </div>

    <div id="msg-section" class="hidden">
        <h3>মেসেজ বক্স</h3>
        <input type="text" id="msg-subject" placeholder="ইমেইল সাবজেক্ট (যেমন: Special Offer)">
        <textarea id="msg-content" rows="6" placeholder="আপনার মেসেজ বা Adstara লিংক এখানে লিখুন..."></textarea>
        <button class="btn btn-p" onclick="sendToAll()"><i class="fas fa-paper-plane"></i> সব জিমেইলে পাঠান</button>
        <button class="btn btn-back" onclick="showSection('dash-section')">ফিরে যান</button>
    </div>

    <div id="sett-section" class="hidden">
        <h3>সেটিংস</h3>
        <div style="background: #334155; padding: 20px; border-radius: 15px; margin-top: 20px;">
            <p style="font-size: 14px; margin-bottom: 15px;">পাসওয়ার্ড পরিবর্তন করতে রিসেট লিঙ্ক পাঠান:</p>
            <button class="btn btn-d" onclick="forgotPass()">রিসেট করুন</button>
        </div>
        <button class="btn btn-back" onclick="showSection('dash-section')">ফিরে যান</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC8NEgB7dsgINyvioNcC65WvC78pEkmXrw",
        authDomain: "ad-sms.firebaseapp.com",
        projectId: "ad-sms",
        databaseURL: "https://ad-sms-default-rtdb.firebaseio.com",
        storageBucket: "ad-sms.firebasestorage.app",
        messagingSenderId: "162639397700",
        appId: "1:162639397700:web:f9983216ba2731dcabcd11"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    emailjs.init("mjx-F2TmBPxlLfsD72229");

    function toggleAuth(isSignup) {
        document.getElementById('login-btn').classList.toggle('hidden', isSignup);
        document.getElementById('signup-btn').classList.toggle('hidden', !isSignup);
        document.getElementById('toggle-text').innerHTML = isSignup ? 
            'একাউন্ট আছে? <span onclick="toggleAuth(false)">লগইন করুন</span>' : 
            'একাউন্ট নেই? <span onclick="toggleAuth(true)">তৈরি করুন</span>';
    }

    function signup() {
        auth.createUserWithEmailAndPassword(v('u-email'), v('u-pass')).then(() => alert("সফল!")).catch(e => alert(e.message));
    }

    function login() {
        auth.signInWithEmailAndPassword(v('u-email'), v('u-pass')).then(() => { showSection('dash-section'); loadContacts(); }).catch(e => alert("ভুল তথ্য!"));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function forgotPass() {
        let email = v('u-email') || prompt("আপনার জিমেইল দিন:");
        if(email) auth.sendPasswordResetEmail(email).then(() => alert("লিঙ্ক পাঠানো হয়েছে।"));
    }

    function showSection(id) {
        document.querySelectorAll('.main-card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function v(id) { return document.getElementById(id).value; }

    function saveContact() {
        let name = v('c-name'), email = v('c-email');
        if(name && email) {
            db.ref('contacts/' + auth.currentUser.uid).push({ name, email });
            document.getElementById('c-name').value = '';
            document.getElementById('c-email').value = '';
        }
    }

    function loadContacts() {
        db.ref('contacts/' + auth.currentUser.uid).on('value', s => {
            let listDiv = document.getElementById('contact-display');
            listDiv.innerHTML = '';
            s.forEach(child => {
                listDiv.innerHTML += `<div class="list-item"><span>${child.val().name}</span><i class="fas fa-trash-alt del-icon" onclick="del('${child.key}')"></i></div>`;
            });
        });
    }
    function del(k) { if(confirm("মুছবেন?")) db.ref('contacts/'+auth.currentUser.uid+'/'+k).remove(); }

    function sendToAll() {
        let subject = v('msg-subject');
        let msg = v('msg-content');
        if(!subject || !msg) return alert("সাবজেক্ট এবং মেসেজ উভয়ই লিখুন!");
        
        db.ref('contacts/' + auth.currentUser.uid).once('value', s => {
            s.forEach(child => {
                emailjs.send("service_76dt1bu", "template_jkcu1eb", {
                    to_email: child.val().email,
                    subject: subject, // এটি আপনার EmailJS টেমপ্লেটের Subject এ {{subject}} হিসেবে ব্যবহার হবে
                    message: msg,
                    name: child.val().name
                });
            });
            alert("সবাইকে পাঠানো হয়েছে!");
        });
    }
</script>
</body>
</html>
