<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Tool Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: linear-gradient(135deg, #4e54c8, #8f94fb); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4e54c8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:hover { background: #3b41a3; }
        .hidden { display: none; }
        .list-box { text-align: left; max-height: 200px; overflow-y: auto; background: #f4f4f4; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 5px 0; }
        .del-btn { background: #ff4757; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-div">
        <h2>লগইন / রেজিস্ট্রেশন</h2>
        <input type="email" id="email" placeholder="আপনার ইমেইল">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)">
        <button onclick="login()">লগইন</button>
        <button onclick="signup()" style="background:#28a745">রেজিস্ট্রেশন করুন</button>
        <p onclick="forgot()" style="color:blue; cursor:pointer; font-size:13px; margin-top:10px;">পাসওয়ার্ড ভুলে গেছেন?</p>
    </div>

    <div id="dash-div" class="hidden">
        <h2>ড্যাশবোর্ড</h2>
        <button onclick="show('list-div')">জিমেইল লিস্ট</button>
        <button onclick="show('msg-div')">SMS/Email পাঠান</button>
        <button onclick="show('sett-div')">সেটিংস</button>
        <button onclick="logout()" style="background:#dc3545">লগআউট</button>
    </div>

    <div id="list-div" class="hidden">
        <h3>জিমেইল লিস্ট</h3>
        <div id="display-list" class="list-box"></div>
        <input type="text" id="c-name" placeholder="নাম">
        <input type="email" id="c-mail" placeholder="জিমেইল">
        <button onclick="add()">লিস্টে সেভ করুন</button>
        <button onclick="show('dash-div')" style="background:#6c757d">পিছনে যান</button>
    </div>

    <div id="msg-div" class="hidden">
        <h3>মেসেজ বক্স</h3>
        <textarea id="msg-body" rows="5" placeholder="Adstara লিঙ্কসহ মেসেজ..."></textarea>
        <button onclick="send()">সবাইকে পাঠান</button>
        <button onclick="show('dash-div')" style="background:#6c757d">পিছনে যান</button>
    </div>

    <div id="sett-div" class="hidden">
        <h3>সেটিংস</h3>
        <button onclick="forgot()">পাসওয়ার্ড পরিবর্তন করুন</button>
        <button onclick="show('dash-div')" style="background:#6c757d">পিছনে যান</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC8NEgB7dsgINyvioNcC65WvC78pEkmXrw",
        authDomain: "ad-sms.firebaseapp.com",
        projectId: "ad-sms",
        databaseURL: "https://ad-sms-default-rtdb.firebaseio.com",
        storageBucket: "ad-sms.firebasestorage.app",
        messagingSenderId: "162639397700",
        appId: "1:162639397700:web:f9983216ba2731dcabcd11"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Registration
    function signup() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(e && p) {
            auth.createUserWithEmailAndPassword(e, p)
            .then(() => alert("রেজিস্ট্রেশন সফল! এখন লগইন করুন।"))
            .catch(error => alert("ভুল: " + error.message));
        } else { alert("ইমেইল ও পাসওয়ার্ড দিন।"); }
    }

    // Login
    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(e, p)
        .then(() => {
            show('dash-div');
            load();
        })
        .catch(error => alert("ভুল তথ্য অথবা একাউন্ট নেই!"));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function forgot() {
        const e = document.getElementById('email').value || prompt("আপনার জিমেইল দিন:");
        if(e) auth.sendPasswordResetEmail(e).then(() => alert("লিঙ্ক পাঠানো হয়েছে।"));
    }

    function show(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // List Management
    function add() {
        const name = document.getElementById('c-name').value;
        const mail = document.getElementById('c-mail').value;
        if(name && mail) {
            db.ref('users/' + auth.currentUser.uid).push({ name, email: mail });
            alert("সেভ হয়েছে");
            document.getElementById('c-name').value = '';
            document.getElementById('c-mail').value = '';
        }
    }

    function load() {
        db.ref('users/' + auth.currentUser.uid).on('value', s => {
            const list = document.getElementById('display-list');
            list.innerHTML = '';
            s.forEach(child => {
                list.innerHTML += `<div class="item">
                    <span>${child.val().name} (${child.val().email})</span>
                    <button class="del-btn" onclick="del('${child.key}')">মুছুন</button>
                </div>`;
            });
        });
    }

    function del(key) {
        if(confirm("মুছে ফেলবেন?")) db.ref('users/' + auth.currentUser.uid + '/' + key).remove();
    }

    function send() {
        alert("ইমেইল পাঠানোর জন্য আপনার EmailJS টেমপ্লেট সেটআপ করুন।");
    }
</script>
</body>
</html>
