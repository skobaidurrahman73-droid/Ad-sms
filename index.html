<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-SMS Pro | Advanced Marketing Tool</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #4e54c8; --bg: #f4f7f6; --white: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #8f94fb, #4e54c8); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { width: 100%; max-width: 500px; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; display: block; text-align: center; color: white; text-decoration: none; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: #2ed573; }
        .btn-danger { background: #ff4757; }
        .btn-secondary { background: #e0e0e0; color: #555; }
        .hidden { display: none; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #eee; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-div">
        <h2>Ad-SMS Pro</h2>
        <input type="email" id="u-email" placeholder="আপনার জিমেইল">
        <input type="password" id="u-pass" placeholder="পাসওয়ার্ড">
        <button class="btn btn-primary" onclick="login()">লগইন</button>
        <button class="btn btn-success" onclick="signup()">রেজিস্ট্রেশন</button>
        <p onclick="forgotPass()" style="text-align:center; color:blue; cursor:pointer; margin-top:15px; font-size:14px;">পাসওয়ার্ড ভুলে গেছেন?</p>
    </div>

    <div id="dash-div" class="hidden">
        <h2>ড্যাশবোর্ড</h2>
        <div class="dash-grid">
            <div class="card" onclick="show('list-div')"><i class="fas fa-list"></i><br>জিমেইল লিস্ট</div>
            <div class="card" onclick="show('msg-div')"><i class="fas fa-paper-plane"></i><br>SMS পাঠান</div>
            <div class="card" onclick="show('sett-div')"><i class="fas fa-cog"></i><br>সেটিংস</div>
            <div class="card" onclick="logout()"><i class="fas fa-power-off"></i><br>লগআউট</div>
        </div>
    </div>

    <div id="list-div" class="hidden">
        <h3>জিমেইল লিস্ট</h3>
        <div id="display-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px;"></div>
        <input type="text" id="c-name" placeholder="নাম">
        <input type="email" id="c-mail" placeholder="জিমেইল">
        <button class="btn btn-success" onclick="addContact()">লিস্টে সেভ করুন</button>
        <button class="btn btn-secondary" onclick="show('dash-div')">পিছনে যান</button>
    </div>

    <div id="msg-div" class="hidden">
        <h3>মেসেজ লিখুন</h3>
        <textarea id="msg-body" rows="6" placeholder="আপনার মেসেজ এখানে লিখুন..."></textarea>
        <p style="font-size: 13px; color: #666;">পাঠানোর মাধ্যম বেছে নিন:</p>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="sendGroupMail()">Gmail</button>
            <button class="btn btn-secondary" onclick="alert('Phone অপশনটি বর্তমানে বন্ধ')">Phone</button>
        </div>
        <button class="btn btn-secondary" onclick="show('dash-div')">পিছনে যান</button>
    </div>

    <div id="sett-div" class="hidden">
        <h3>সেটিংস</h3>
        <p style="margin: 15px 0; color: #666;">পাসওয়ার্ড পরিবর্তন করার জন্য রিসেট লিঙ্ক পাঠান:</p>
        <button class="btn btn-danger" onclick="forgotPass()">রিসেট লিঙ্ক পাঠান</button>
        <button class="btn btn-secondary" onclick="show('dash-div')">পিছনে যান</button>
    </div>
</div>

<script>
    // আপনার ফায়ারবেজ কনফিগ
    const firebaseConfig = {
        apiKey: "AIzaSyC8NEgB7dsgINyvioNcC65WvC78pEkmXrw",
        authDomain: "ad-sms.firebaseapp.com",
        projectId: "ad-sms",
        databaseURL: "https://ad-sms-default-rtdb.firebaseio.com",
        storageBucket: "ad-sms.firebasestorage.app",
        messagingSenderId: "162639397700",
        appId: "1:162639397700:web:f9983216ba2731dcabcd11"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // EmailJS সেটআপ
    emailjs.init("YOUR_PUBLIC_KEY"); 

    // Auth Functions
    function signup() {
        auth.createUserWithEmailAndPassword(v('u-email'), v('u-pass')).then(()=>alert("সফল!")).catch(e=>alert(e.message));
    }
    function login() {
        auth.signInWithEmailAndPassword(v('u-email'), v('u-pass')).then(()=>{ show('dash-div'); loadContacts(); }).catch(e=>alert("ভুল তথ্য!"));
    }
    function logout() { auth.signOut().then(()=>location.reload()); }
    function forgotPass() {
        let em = v('u-email') || prompt("আপনার জিমেইল দিন:");
        if(em) auth.sendPasswordResetEmail(em).then(()=>alert("জিমেইল চেক করুন।"));
    }

    // UI Functions
    function show(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function v(id) { return document.getElementById(id).value; }

    // List Management
    function addContact() {
        let name = v('c-name'), mail = v('c-mail');
        if(name && mail) {
            db.ref('users/' + auth.currentUser.uid).push({ name, email: mail });
            document.getElementById('c-name').value = '';
            document.getElementById('c-mail').value = '';
        }
    }
    function loadContacts() {
        db.ref('users/' + auth.currentUser.uid).on('value', s => {
            let div = document.getElementById('display-list');
            div.innerHTML = '';
            s.forEach(c => {
                div.innerHTML += `<div class="item">
                    <span><b>${c.val().name}</b> (${c.val().email})</span>
                    <button style="background:red; color:white; border:none; padding:5px; border-radius:5px;" onclick="del('${c.key}')">মুছুন</button>
                </div>`;
            });
        });
    }
    function del(k) { if(confirm("মুছবেন?")) db.ref('users/'+auth.currentUser.uid+'/'+k).remove(); }

    // Sending Email
    function sendGroupMail() {
        let msg = v('msg-body');
        if(!msg) return alert("মেসেজ লিখুন!");
        db.ref('users/' + auth.currentUser.uid).once('value', s => {
            s.forEach(c => {
                emailjs.send("Service_76dt1bu", "YOUR_TEMPLATE_ID", {
                    to_email: c.val().email,
                    message: msg
                });
            });
            alert("সবাইকে পাঠানো হয়েছে!");
        });
    }
</script>
</body>
</html>
